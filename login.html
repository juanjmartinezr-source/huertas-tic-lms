<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Huertas TIC</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h2>Iniciar sesión</h2>
      <form id="loginForm">
        <label for="username">Usuario</label>
        <input id="username" name="username" required />
        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" required />
        <div class="row">
          <button type="submit" class="btn primary">Entrar</button>
          <button id="demoBtn" type="button" class="btn">Demo estudiante</button>
        </div>
        <p id="error" class="error" aria-live="polite"></p>
      </form>

      <p class="small">Usuarios por defecto: profesor (juan/1234) y estudiantes (4321/4321, 4567/4567, 7890/7890). Edita json/users.json para agregar más.</p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
