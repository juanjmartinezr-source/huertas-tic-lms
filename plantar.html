<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>¿Qué puedo sembrar? - Huertas TIC</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">Huertas TIC</div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="curso.html">Curso</a>
      <a class="active" href="plantar.html">🌱 ¿Qué puedo sembrar?</a>
    </nav>
  </aside>

  <header class="topbar"><h1>🌱 ¿Qué puedo sembrar?</h1></header>

  <main class="main">
    <form id="plantForm" class="card">
      <label>Departamento <input id="departamento" /></label>
      <label>Municipio <input id="municipio" /></label>
      <label>Altitud (m) <input id="altitud" type="number" /></label>
      <label>Temperatura (°C) <input id="temperatura" type="number" /></label>
      <label>Humedad (%) <input id="humedad" type="number" /></label>
      <div class="row">
        <button class="btn primary" type="submit">Buscar cultivos</button>
        <button id="clearBtn" type="button" class="btn">Limpiar</button>
      </div>
    </form>

    <section id="results" class="grid">
      <!-- Resultados -->
    </section>
  </main>

  <script src="js/plantas.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
